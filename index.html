<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<title>Dashboard — Hermes</title>
<style>
  :root {
    --bg: #0d1117; --card: #161b22; --border: #30363d;
    --text: #c9d1d9; --muted: #8b949e;
    --red: #f85149; --yellow: #d2991d; --green: #3fb950; --blue: #58a6ff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text);
    padding: 12px; max-width: 1000px; margin: 0 auto;
    -webkit-tap-highlight-color: transparent;
  }
  h1 { font-size: 18px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .updated { font-size: 11px; color: var(--muted); margin-bottom: 12px; }
  
  .add-form {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 10px; margin-bottom: 12px;
    display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
  }
  .add-form input, .add-form select {
    background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 6px 8px; border-radius: 6px; font-size: 13px;
  }
  .add-form input[type="text"] { flex: 1; min-width: 100px; }
  .add-form select { width: 85px; }
  .add-form button {
    background: var(--blue); color: #fff; border: none;
    padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer;
  }

  .kanban {
    display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 10px; margin-bottom: 12px;
  }
  @media (max-width: 700px) { .kanban { grid-template-columns: 1fr 1fr; } }

  .col {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px; min-height: 100px;
  }
  .col h2 { font-size: 13px; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
  .col.drag-over { border-color: var(--blue); background: #161f2e; }

  .task {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 6px; padding: 7px 9px; margin-bottom: 6px;
    font-size: 13px; display: flex; align-items: center; gap: 8px;
    cursor: grab; transition: opacity 0.15s;
  }
  .task:active { cursor: grabbing; }
  .task.dragging { opacity: 0.4; }
  .task.selected { border-color: var(--blue); box-shadow: 0 0 0 1px var(--blue); }
  .task .prio {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
  .prio-high { background: var(--red); }
  .prio-medium { background: var(--yellow); }
  .prio-low { background: var(--green); }
  .task .text { flex: 1; }
  .task .done-text { text-decoration: line-through; color: var(--muted); }
  .task .deadline { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .task .del {
    color: var(--red); cursor: pointer; font-size: 14px;
    padding: 2px 5px; border-radius: 4px; flex-shrink: 0;
  }
  .badge {
    display: inline-block; font-size: 10px; padding: 1px 5px;
    border-radius: 8px; margin-left: 4px;
  }
  .badge-work { background: #1f3a5f; color: var(--blue); }
  .badge-home { background: #2d1f3a; color: #bc8cff; }
  .badge-health { background: #1f3a2d; color: var(--green); }
  .empty { color: var(--muted); font-size: 12px; font-style: italic; padding: 8px 0; }

  .bottom { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 700px) { .bottom { grid-template-columns: 1fr; } }
  
  .note { padding: 5px 0; font-size: 13px; display: flex; align-items: center; gap: 6px; border-bottom: 1px solid var(--border); }
  .note:last-child { border-bottom: none; }
  .note .ntext { flex: 1; color: var(--muted); }
  .note .del { color: var(--red); cursor: pointer; font-size: 14px; padding: 2px 6px; }
  .note-form { display: flex; gap: 6px; margin-top: 8px; }
  .note-form input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 5px 8px; border-radius: 6px; font-size: 12px;
  }
  .note-form button {
    background: var(--blue); color: #fff; border: none;
    padding: 5px 10px; border-radius: 6px; font-size: 12px; cursor: pointer;
  }
  .deadline-task { padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 13px; display: flex; align-items: center; gap: 8px; }
  .deadline-task:last-child { border-bottom: none; }
  .deadline-task .dl { font-size: 11px; color: var(--muted); margin-left: auto; white-space: nowrap; }

  .sync-btn {
    display: block; margin: 14px auto;
    background: var(--border); color: var(--muted);
    border: 1px solid var(--border); padding: 6px 14px;
    border-radius: 8px; font-size: 12px; cursor: pointer; text-align: center;
  }
  .sync-bar {
    display: none; position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card); border-top: 1px solid var(--border);
    padding: 10px; text-align: center;
  }
  .sync-bar textarea {
    width: 100%; height: 70px; background: var(--bg);
    border: 1px solid var(--border); color: var(--text);
    padding: 6px; border-radius: 6px; font-size: 11px; font-family: monospace;
  }
  .sync-bar .btns { margin-top: 6px; display: flex; gap: 6px; justify-content: center; }
  .sync-bar button { padding: 6px 12px; border-radius: 6px; font-size: 12px; border: none; cursor: pointer; }
  .sync-bar .copy { background: var(--green); color: #000; }
  .sync-bar .close { background: var(--border); color: var(--text); }
</style>
</head>
<body>
<h1>📊 Дашборд — Гера</h1>
<p class="updated">Обновлено: <span id="ts"></span> · <span id="src"></span></p>

<div class="add-form">
  <input type="text" id="newTask" placeholder="Новая задача..." autocomplete="off">
  <select id="newPrio">
    <option value="high">🔥 Срочно</option>
    <option value="medium" selected>📋 Обычно</option>
    <option value="low">✅ Фон</option>
  </select>
  <button onclick="addTask()">+</button>
</div>

<p style="font-size:11px;color:var(--muted);margin:-4px 0 6px">👆 Тапни задачу → тапни заголовок колонки для перемещения</p>

<div class="kanban">
  <div class="col" id="col-todo">
    <h2 onclick="moveSelectedTo('todo')">📋 Сделать <span style="font-size:11px;color:var(--muted);font-weight:normal" id="cnt-todo"></span></h2>
    <div id="todo"></div>
  </div>
  <div class="col" id="col-in_progress">
    <h2 onclick="moveSelectedTo('in_progress')">🔄 В процессе <span style="font-size:11px;color:var(--muted);font-weight:normal" id="cnt-in_progress"></span></h2>
    <div id="in_progress"></div>
  </div>
  <div class="col" id="col-done">
    <h2 onclick="moveSelectedTo('done')">✅ Выполнено <span style="font-size:11px;color:var(--muted);font-weight:normal" id="cnt-done"></span></h2>
    <div id="done"></div>
  </div>
  <div class="col" id="col-cancelled">
    <h2 onclick="moveSelectedTo('cancelled')">🚫 Отменено <span style="font-size:11px;color:var(--muted);font-weight:normal" id="cnt-cancelled"></span></h2>
    <div id="cancelled"></div>
  </div>
</div>

<div class="bottom">
  <div class="col">
    <h2>📝 Заметки</h2>
    <div id="notes"></div>
    <div class="note-form">
      <input type="text" id="newNote" placeholder="Заметка..." autocomplete="off">
      <button onclick="addNote()">+</button>
    </div>
  </div>
  <div class="col">
    <h2>⏰ Дедлайны</h2>
    <div id="deadlines"></div>
  </div>
</div>

<button class="sync-btn" onclick="toggleSync()">📋 Скопировать JSON для GitHub</button>
<button class="sync-btn" onclick="setupToken()" style="margin-top:-8px">🔐 Ввести GitHub токен (авто-синхронизация)</button>
<div class="sync-bar" id="syncBar">
  <textarea id="jsonOut" readonly></textarea>
  <div class="btns">
    <button class="copy" onclick="copyJson()">📋 Копировать</button>
    <button class="close" onclick="toggleSync()">Закрыть</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'hermes_dashboard_v2';
let data = { todo: [], in_progress: [], done: [], cancelled: [], notes: [], updated: '' };

function load() {
  const cached = localStorage.getItem(STORAGE_KEY);
  const localData = cached ? JSON.parse(cached) : null;

  fetch('tasks.json?v=' + Date.now())
    .then(r => { if (!r.ok) throw new Error('fail'); return r.json(); })
    .then(remote => {
      remote = compatData(remote);
      const localTime = localData ? new Date(localData.updated || 0).getTime() : 0;
      const remoteTime = new Date(remote.updated || 0).getTime();

      // If local has unsaved changes (newer), use local
      if (localTime > remoteTime) {
        data = localData;
        document.getElementById('src').textContent = '(не сохранено в GitHub)';
      } else {
        data = remote;
        document.getElementById('src').textContent = '(GitHub)';
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      render();
    })
    .catch(() => {
      if (localData) { data = localData; document.getElementById('src').textContent = '(офлайн)'; }
      render();
    });
}

// Convert old priority-based format to new status-based format
function compatData(d) {
  if (d.todo !== undefined) return d; // Already v2
  const r = { todo: [], in_progress: [], done: [], cancelled: [], notes: d.notes || [], updated: d.updated };
  ['high', 'medium', 'low'].forEach(p => {
    if (d[p]) d[p].forEach(t => { if (t.done) r.done.push(t); else r.todo.push(t); });
  });
  return r;
}

function save() {
  data.updated = new Date().toISOString();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  syncToGitHub();
}

// Auto-sync to GitHub (immediate)
async function syncToGitHub() {
  const token = localStorage.getItem('github_token');
  if (!token) {
    document.getElementById('src').textContent = '(нет токена — сохранено локально)';
    return;
  }
  document.getElementById('src').textContent = '(синхронизация...)';
  const content = JSON.stringify(data, null, 2);
  const owner = 'dmitrykabackiy-eng';
  const repo = 'dashboard';

  try {
    const getResp = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/tasks.json`, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!getResp.ok) throw new Error('auth');
    const fileInfo = await getResp.json();
    const sha = fileInfo.sha;

    const putResp = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/tasks.json`, {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: 'Update from dashboard',
        content: btoa(unescape(encodeURIComponent(content))),
        sha: sha
      })
    });

    if (putResp.ok) {
      document.getElementById('src').textContent = '(GitHub ✓)';
    } else {
      document.getElementById('src').textContent = '(ошибка синхронизации)';
    }
  } catch(e) {
    document.getElementById('src').textContent = '(ошибка синхронизации)';
  }
}

function setupToken() {
  const t = prompt('GitHub токен для авто-синхронизации (создать: github.com/settings/tokens, scope: public_repo):');
  if (t) {
    localStorage.setItem('github_token', t);
    syncToGitHub();
    alert('Токен сохранён! Синхронизация активна.');
  }
}

function addTask() {
  const input = document.getElementById('newTask');
  const text = input.value.trim();
  if (!text) return;
  data.todo.push({ text, priority: document.getElementById('newPrio').value });
  input.value = '';
  save(); render();
}

function addNote() {
  const input = document.getElementById('newNote');
  const text = input.value.trim();
  if (!text) return;
  data.notes.push(text);
  input.value = '';
  save(); render();
}

function deleteTask(column, idx) {
  data[column].splice(idx, 1);
  save(); render();
}

function deleteNote(idx) {
  data.notes.splice(idx, 1);
  save(); render();
}

// Tap-to-select, tap-column-to-move
let selected = null; // { column, idx }

function selectTask(column, idx) {
  document.querySelectorAll('.task.selected').forEach(t => t.classList.remove('selected'));
  if (selected && selected.column === column && selected.idx === idx) {
    // Tap same task → deselect
    selected = null;
    return;
  }
  selected = { column, idx };
  // Find and highlight the task element
  const el = document.getElementById(column);
  if (el) {
    const tasks = el.querySelectorAll('.task');
    if (tasks[idx]) tasks[idx].classList.add('selected');
  }
}

function moveSelectedTo(targetCol) {
  if (!selected) return;
  if (selected.column === targetCol) { selected = null; render(); return; }
  const task = data[selected.column].splice(selected.idx, 1)[0];
  data[targetCol].push(task);
  selected = null;
  save(); render();
}

function render() {
  document.getElementById('ts').textContent = new Date(data.updated).toLocaleString('ru-RU');

  function renderCol(col) {
    const el = document.getElementById(col);
    const list = data[col] || [];
    document.getElementById('cnt-' + col).textContent = list.length ? '(' + list.length + ')' : '';
    if (list.length === 0) {
      el.innerHTML = '<div class="empty">Пусто</div>';
      return;
    }
    el.innerHTML = list.map((t, i) => `
      <div class="task" onclick="selectTask('${col}', ${i})">
        <div class="prio prio-${t.priority || 'medium'}"></div>
        <span class="text ${col === 'done' || col === 'cancelled' ? 'done-text' : ''}">${t.text}
          ${t.category ? '<span class="badge badge-' + t.category + '">' + t.category + '</span>' : ''}
        </span>
        ${t.deadline ? '<span class="deadline">📅 ' + t.deadline + '</span>' : ''}
        <span class="del" onclick="deleteTask('${col}', ${i}); event.stopPropagation();">✕</span>
      </div>
    `).join('');
  }
  renderCol('todo');
  renderCol('in_progress');
  renderCol('done');
  renderCol('cancelled');

  const notesEl = document.getElementById('notes');
  if (!data.notes || data.notes.length === 0) {
    notesEl.innerHTML = '<div class="empty">Пока пусто</div>';
  } else {
    notesEl.innerHTML = data.notes.map((n, i) => `
      <div class="note"><span class="ntext">${n}</span>
        <span class="del" onclick="deleteNote(${i})">✕</span>
      </div>`).join('');
  }

  const dlEl = document.getElementById('deadlines');
  const all = [...data.todo, ...data.in_progress].filter(t => t.deadline);
  all.sort((a,b) => new Date(a.deadline) - new Date(b.deadline));
  if (all.length === 0) {
    dlEl.innerHTML = '<div class="empty">Нет дедлайнов</div>';
  } else {
    dlEl.innerHTML = all.slice(0, 7).map(t => `
      <div class="deadline-task">
        <div class="prio prio-${t.priority || 'medium'}"></div>
        <span>${t.text}</span>
        <span class="dl">📅 ${t.deadline}</span>
      </div>`).join('');
  }
}

function toggleSync() {
  const bar = document.getElementById('syncBar');
  const v = bar.style.display === 'block';
  bar.style.display = v ? 'none' : 'block';
  if (!v) document.getElementById('jsonOut').value = JSON.stringify(data, null, 2);
}
function copyJson() {
  const ta = document.getElementById('jsonOut');
  ta.select(); document.execCommand('copy');
  alert('Скопировано! Вставь в tasks.json на GitHub → Commit.');
}

document.getElementById('newTask').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
document.getElementById('newNote').addEventListener('keydown', e => { if (e.key === 'Enter') addNote(); });

load();
</script>
</body>
</html>
